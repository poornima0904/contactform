<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form & To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Contact Form -->
        <section class="contact-section">
            <h2 class="section-title">Contact Us</h2>
            <form id="contactForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required>
                    <div class="error" id="nameError">Name is required.</div>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                    <div class="error" id="emailError">Please enter a valid email.</div>
                </div>
                 <div class="form-group">
                    <label for="Ph.no">Phone Number</label>
                    <input type="number" id="Number" name="Number" required>
                    <div class="error" id="NumberError">Name is required.</div>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" required></textarea>
                    <div class="error" id="messageError">Message is required.</div>
                </div>
                <button type="submit" class="submit-btn">Submit</button>
            </form>
        </section>

        <!-- Dynamic To-Do List -->
        <section class="todo-section">
            <h2 class="section-title">To-Do List</h2>
            <div class="todo-input-group">
                <input type="text" id="todoInput" placeholder="Enter a new task...">
                <button class="add-btn" onclick="addTask()">Add Task</button>
            </div>
            <ul id="todoList"></ul>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
